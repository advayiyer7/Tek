appId: com.advayiyer.tek
productName: Tek
copyright: Copyright © 2026 Advay Iyer

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

# Ship the sidecar source + requirements; the Python venv is created in
# userData on first run (resources/ is read-only when installed).
extraResources:
  - from: sidecar
    to: sidecar
    filter:
      - '**/*'
      - '!.venv/**'
      - '!__pycache__/**'
      - '!**/__pycache__/**'
      - '!eval_retrieval.py'

win:
  target:
    - target: nsis
      arch: [x64]
  # Standalone CPython (python-build-standalone) so installed apps never
  # need system Python. Fetched at dist time by scripts/fetch-python.mjs.
  extraResources:
    - from: build-python/win32-x64/python
      to: python

nsis:
  oneClick: true
  deleteAppDataOnUninstall: false

# Apple Silicon only for now — Intel build needs a darwin-x64 python and a
# second pass; revisit if anyone asks.
mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.productivity
  extraResources:
    - from: build-python/darwin-arm64/python
      to: python

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  extraResources:
    - from: build-python/linux-x64/python
      to: python

npmRebuild: false
